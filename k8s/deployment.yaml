# Docs: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clo835-assignment2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clo835-assignment2
  template:
    metadata:
      labels:
        app: clo835-assignment2
    spec:
      containers:
        - name: nodejs-app
          image: zjlianlee/clo835-assignment2:0.3.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
